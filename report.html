<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рапорт об обнаружении тела</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="scanline"></div>
        <h1>📄 РАПОРТ ОБ ОБНАРУЖЕНИИ ТЕЛА</h1>
        <p class="subtitle">Уровень секретности: <span class="redacted">СОВЕРШЕННО СЕКРЕТНО</span></p>
        <p>Выберите подсказку для расшифровки:</p>
        <div class="clue-container" id="clueContainer"></div>
        <a href="index.html" class="back-link">← Вернуться в базу</a>
    </div>
    <script>
        const clues = [
            { id: "Подсказка 1", text: "Внимательно прочитайте разделы «Обстоятельства инцидента» и «Первичный осмотр». Обратите внимание на тип замка, время смерти и серийный номер флакона." },
            { id: "Подсказка 2", text: "Сравните тип замка, указанный в рапорте, с описанием в дневнике. А также сравните серию препарата здесь с той, что Алекс записал в дневнике и в чеке." },
            { id: "Подсказка 3", text: "Это явные признаки подделки сцены! В рапорте дверь заперта на электронный замок, а в дневнике (стр. 3) написан физический ключ. Серия флакона здесь XJ-909, хотя Алекс получил AL-442." }
        ];
        const container = document.getElementById('clueContainer');
        clues.forEach(clue => {
            const card = document.createElement('div');
            card.className = 'clue-card';
            card.innerHTML = `<div class="clue-header">${clue.id}</div><div class="clue-content">${clue.text}</div>`;
            card.addEventListener('click', function() {
                const content = this.querySelector('.clue-content');
                content.style.display = content.style.display === 'block' ? 'none' : 'block';
            });
            container.appendChild(card);
        });
    </script>
</body>
</html>
