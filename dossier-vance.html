<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Досье: Виктор Вэнс</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="scanline"></div>
        <h1>📁 ДОСЬЕ: ВИКТОР ВЭНС</h1>
        <p class="subtitle">Уровень секретности: <span class="redacted">TOP SECRET</span></p>
        <p>Выберите подсказку для расшифровки:</p>
        <div class="clue-container" id="clueContainer"></div>
        <a href="index.html" class="back-link">← Вернуться в базу</a>
    </div>
    <script>
        const clues = [
            { id: "Подсказка 1", text: "Изучите раздел «Оперативная заметка СБ» в самом низу документа." },
            { id: "Подсказка 2", text: "Официальные отчеты говорят одно, а данные геолокации его мобильного терминала показывают другое. Где на самом деле находился Вэнс 11 июля?" },
            { id: "Подсказка 3", text: "Вэнс солгал о своем местонахождении. 11 июля его телефон был зафиксирован в Будапеште, а не в Брюсселе. Это дает ему возможность лично контролировать подготовку к убийству на месте." }
        ];
        const container = document.getElementById('clueContainer');
        clues.forEach(clue => {
            const card = document.createElement('div');
            card.className = 'clue-card';
            card.innerHTML = `<div class="clue-header">${clue.id}</div><div class="clue-content">${clue.text}</div>`;
            card.addEventListener('click', function() {
                const content = this.querySelector('.clue-content');
                content.style.display = content.style.display === 'block' ? 'none' : 'block';
            });
            container.appendChild(card);
        });
    </script>
</body>
</html>
