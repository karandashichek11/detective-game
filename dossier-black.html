<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Досье: Кристиан Блэк</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="scanline"></div>
        <h1>📁 ДОСЬЕ: КРИСТИАН БЛЭК</h1>
        <p class="subtitle">Уровень секретности: <span class="redacted">TOP SECRET</span></p>
        <p>Выберите подсказку для расшифровки:</p>
        <div class="clue-container" id="clueContainer"></div>
        <a href="index.html" class="back-link">← Вернуться в базу</a>
    </div>
    <script>
        const clues = [
            { id: "Подсказка 1", text: "Обратите внимание на его алиби на вечер 12 июля и странный приказ Вэнса, найденный в его шкафчике." },
            { id: "Подсказка 2", text: "Если его токен был использован для авторизации в 19:50, где физически находился Блэк в это время согласно его собственным показаниям?" },
            { id: "Подсказка 3", text: "Блэк был на вокзале Keleti. Его токен украли или скопировали, чтобы использовать для авторизации и подставить его, в то время как реальная атака шла с компьютера Торна." }
        ];
        const container = document.getElementById('clueContainer');
        clues.forEach(clue => {
            const card = document.createElement('div');
            card.className = 'clue-card';
            card.innerHTML = `<div class="clue-header">${clue.id}</div><div class="clue-content">${clue.text}</div>`;
            card.addEventListener('click', function() {
                const content = this.querySelector('.clue-content');
                content.style.display = content.style.display === 'block' ? 'none' : 'block';
            });
            container.appendChild(card);
        });
    </script>
</body>
</html>
