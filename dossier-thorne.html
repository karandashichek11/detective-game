<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Досье: Маркус Торн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="scanline"></div>
        <h1>📁 ДОСЬЕ: МАРКУС ТОРН</h1>
        <p class="subtitle">Уровень секретности: <span class="redacted">TOP SECRET</span></p>
        <p>Выберите подсказку для расшифровки:</p>
        <div class="clue-container" id="clueContainer"></div>
        <a href="index.html" class="back-link">← Вернуться в базу</a>
    </div>
    <script>
        const clues = [
            { id: "Подсказка 1", text: "Запомните его физический MAC-адрес и его специфический доступ к системам климат-контроля в отелях." },
            { id: "Подсказка 2", text: "Сравните MAC-адрес терминала Торна из этого досье с MAC-адресом, который фигурирует в сетевых логах атаки на отель «Гранд»." },
            { id: "Подсказка 3", text: "MAC-адрес 00-1A-2B-3C-4D-A3 принадлежит именно Маркусу Торну. Это железное доказательство того, что атаку на вентиляцию и стирание диска инициировал он, а не Блэк." }
        ];
        const container = document.getElementById('clueContainer');
        clues.forEach(clue => {
            const card = document.createElement('div');
            card.className = 'clue-card';
            card.innerHTML = `<div class="clue-header">${clue.id}</div><div class="clue-content">${clue.text}</div>`;
            card.addEventListener('click', function() {
                const content = this.querySelector('.clue-content');
                content.classList.toggle('open');
            });
            container.appendChild(card);
        });
    </script>
</body>
</html>
