<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Досье: Анна Нильсен</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="scanline"></div>
        <h1>📁 ДОСЬЕ: АННА НИЛЬСЕН</h1>
        <p class="subtitle">Уровень секретности: <span class="redacted">TOP SECRET</span></p>
        <p>Выберите подсказку для расшифровки:</p>
        <div class="clue-container" id="clueContainer"></div>
        <a href="index.html" class="back-link">← Вернуться в базу</a>
    </div>
    <script>
        const clues = [
            { id: "Подсказка 1", text: "Внимательно прочитайте недописанную записку в разделе «Оперативная заметка СБ»." },
            { id: "Подсказка 2", text: "Кого именно Нильсен идентифицировала как взломщика, прежде чем ее записка внезапно оборвалась?" },
            { id: "Подсказка 3", text: "Нильсен успела перехватить MAC-адрес взломщика и написала, что он указывает на терминал Маркуса (Торна). Она не соучастница, она пыталась помочь и разоблачить убийц." }
        ];
        const container = document.getElementById('clueContainer');
        clues.forEach(clue => {
            const card = document.createElement('div');
            card.className = 'clue-card';
            card.innerHTML = `<div class="clue-header">${clue.id}</div><div class="clue-content">${clue.text}</div>`;
            card.addEventListener('click', function() {
                const content = this.querySelector('.clue-content');
                content.classList.toggle('open');
            });
            container.appendChild(card);
        });
    </script>
</body>
</html>
